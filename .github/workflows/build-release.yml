name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Build frontend (static export)
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npx next build

      # Build backend (PyInstaller)
      - name: Install backend dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Bundle backend with PyInstaller
        working-directory: backend
        run: python -m PyInstaller run_server.spec --noconfirm

      # Build Electron installer
      - name: Install Electron dependencies
        working-directory: electron
        run: npm ci

      - name: Build Electron app (no publish)
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --${{ matrix.platform }} --publish never

      # Upload artifacts
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.platform }}
          path: |
            dist-electron/*.exe
            dist-electron/*.dmg
            dist-electron/*.yml
            dist-electron/*.blockmap

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: installer-win
          path: artifacts/win

      - name: Download Mac artifacts
        uses: actions/download-artifact@v4
        with:
          name: installer-mac
          path: artifacts/mac

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/win/*.exe
            artifacts/win/latest.yml
            artifacts/mac/*.dmg
            artifacts/mac/latest-mac.yml
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
