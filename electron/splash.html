<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; background: #1a2d5a; font-family: 'Segoe UI', sans-serif;
      color: white; flex-direction: column; gap: 20px;
    }
    h1 { font-size: 22px; font-weight: 600; letter-spacing: 1px; }
    p { font-size: 13px; color: rgba(255,255,255,0.6); }
    .spinner {
      width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #e31e24; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>Premier Business Center</h1>
  <div class="spinner"></div>
  <p>Starting Shared Cost Engine...</p>
</body>
</html>
