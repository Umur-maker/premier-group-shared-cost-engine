services:
  - type: web
    name: premier-bc-api
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        value: https://premier-group-shared-cost-engine.vercel.app,http://localhost:3000
      - key: PYTHON_VERSION
        value: "3.12"
